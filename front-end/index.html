<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/login.css">
  <title>CarControl - Login</title>
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <div class="logo">
                <img src="img/logo.png" alt="Logo CarControl">
            </div>
            <div class="left">
                <p class="welcome">Bem vindo!</p>
                <p class="text">Faça o seu login e tenha acesso ao sistema de gestão da <span class="highlight">sua mecânica</span>.</p>
            </div>
            <div class="separator"></div>
            <div class="right">
            <h2>LOGIN</h2>
            <form id="loginForm">
                <input type="text" id="nome" placeholder="Digite seu login">
                <input type="password" id="senha" placeholder="Digite sua senha">
                <button type="submit">ENTRAR</button>
            </form>
            </div>
        </div>
    </div>
    <script src="js/script.js"></script>
</body>
</html>
